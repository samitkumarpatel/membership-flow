<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Membership Portal</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="/js/api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; }
    header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    .user-chip { display: flex; align-items: center; gap: .5rem; font-size: .875rem; }
    .user-chip button { background: transparent; border: 1px solid rgba(255,255,255,.4); color: #fff; padding: .3rem .75rem; border-radius: 20px; cursor: pointer; font-size: .8rem; }
    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .auth-card { background: #fff; border-radius: 12px; padding: 2rem; max-width: 400px; margin: 3rem auto; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .auth-card h2 { font-size: 1.1rem; margin-bottom: 1.25rem; }
    .field { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .9rem; }
    .field label { font-size: .8rem; font-weight: 600; color: #555; }
    .field input { padding: .55rem .8rem; border: 1px solid #ddd; border-radius: 7px; font-size: .95rem; }
    .field input:focus { outline: none; border-color: #6c63ff; }
    .btn { display: inline-block; padding: .55rem 1.1rem; border-radius: 7px; font-size: .9rem; cursor: pointer; border: none; font-weight: 500; text-align: center; }
    .btn-primary { background: #6c63ff; color: #fff; width: 100%; }
    .btn-primary:hover { background: #574fd6; }
    .btn-outline { background: transparent; border: 1px solid #6c63ff; color: #6c63ff; width: 100%; margin-top: .5rem; }
    .btn-sm { width: auto; padding: .35rem .8rem; font-size: .85rem; }
    .btn-danger-sm { background: #ffeaea; color: #c0392b; border: none; padding: .35rem .7rem; border-radius: 6px; font-size: .8rem; cursor: pointer; }
    .error { color: #c0392b; font-size: .85rem; margin-top: .4rem; }
    .tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    .tabs button { padding: .45rem 1.1rem; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: .875rem; color: #555; }
    .tabs button.active { background: #6c63ff; color: #fff; border-color: #6c63ff; }
    /* Subscription cards */
    .sub-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 1.25rem; overflow: hidden; }
    .sub-card .sub-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid #eee; }
    .sub-card .sub-header h3 { font-size: 1.05rem; margin-bottom: .2rem; }
    .sub-card .sub-header p { font-size: .875rem; color: #666; }
    .plan-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: .75rem; padding: 1.25rem 1.5rem; }
    .plan-option { border: 2px solid #eee; border-radius: 10px; padding: 1rem; cursor: pointer; transition: border-color .15s; }
    .plan-option:hover { border-color: #6c63ff; }
    .plan-option.selected { border-color: #6c63ff; background: #f5f3ff; }
    .plan-option .interval { font-weight: 700; font-size: .9rem; }
    .plan-option .price { font-size: 1.4rem; font-weight: 700; color: #6c63ff; margin: .3rem 0; }
    .plan-option .price small { font-size: .85rem; font-weight: 400; color: #888; }
    .sub-card .sub-footer { padding: .9rem 1.5rem; border-top: 1px solid #eee; display: flex; justify-content: flex-end; }
    .badge { display: inline-block; padding: .2rem .6rem; border-radius: 20px; font-size: .75rem; font-weight: 600; }
    .badge-active { background: #e6faf0; color: #1d9e6a; }
    .badge-pending { background: #fff8e6; color: #c07c00; }
    .badge-cancelled { background: #ffeaea; color: #c0392b; }
    .badge-suspended { background: #fdf0ff; color: #8e44ad; }
    .membership-card { background: #fff; border-radius: 10px; padding: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); display: flex; justify-content: space-between; align-items: center; margin-bottom: .75rem; flex-wrap: wrap; gap: .5rem; }
    .banner { padding: 1rem 1.5rem; border-radius: 10px; margin-bottom: 1.5rem; font-size: .9rem; }
    .banner-success { background: #e6faf0; color: #1d9e6a; border: 1px solid #b2dfcc; }
    .banner-warn { background: #fff8e6; color: #c07c00; border: 1px solid #f5d576; }
    .empty { text-align: center; color: #999; padding: 2rem; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>Membership Portal</h1>
    <div class="user-chip" v-if="member">
      <span>{{ member.name || member.email }}</span>
      <button @click="logout">Log out</button>
    </div>
  </header>

  <main>

    <!-- Auth -->
    <template v-if="!member">
      <div class="auth-card">
        <h2>{{ authMode === 'register' ? 'Create account' : 'Sign in' }}</h2>
        <div class="field" v-if="authMode === 'register'">
          <label>Name</label>
          <input v-model="authForm.name" placeholder="Your name"/>
        </div>
        <div class="field">
          <label>Email</label>
          <input v-model="authForm.email" type="email" placeholder="you@example.com" @keyup.enter="authSubmit"/>
        </div>
        <div class="error" v-if="authError">{{ authError }}</div>
        <button class="btn btn-primary" @click="authSubmit">
          {{ authMode === 'register' ? 'Register' : 'Sign in' }}
        </button>
        <button class="btn btn-outline" @click="toggleAuth">
          {{ authMode === 'register' ? 'Already registered? Sign in' : 'New here? Register' }}
        </button>
      </div>
    </template>

    <!-- Logged in -->
    <template v-else>
      <div class="banner banner-success" v-if="checkoutSuccess">
        Payment complete — your membership is being activated.
      </div>
      <div class="banner banner-warn" v-if="checkoutCancelled">
        Checkout cancelled. You can try again any time.
      </div>

      <div class="tabs">
        <button :class="{ active: view === 'browse' }" @click="view='browse'">Browse Plans</button>
        <button :class="{ active: view === 'memberships' }" @click="view='memberships'; loadMemberships()">My Memberships</button>
      </div>

      <!-- Browse -->
      <template v-if="view === 'browse'">
        <div class="empty" v-if="subscriptions.length === 0">No subscription plans available yet.</div>
        <div class="sub-card" v-for="s in subscriptions" :key="s.id">
          <div class="sub-header">
            <h3>{{ s.name }}</h3>
            <p v-if="s.description">{{ s.description }}</p>
          </div>
          <div class="plan-options">
            <div class="plan-option"
                 v-for="p in s.plans" :key="p.shopifySellingPlanId"
                 :class="{ selected: selected[s.id] === p.shopifySellingPlanId }"
                 @click="selected[s.id] = p.shopifySellingPlanId">
              <div class="interval">{{ labelFor(p.interval, p.intervalCount) }}</div>
              <div class="price">{{ p.currency }} {{ p.price }}</div>
            </div>
          </div>
          <div class="sub-footer">
            <button class="btn btn-primary btn-sm"
                    :disabled="!selected[s.id] || subscribing === s.id"
                    @click="subscribe(s)">
              {{ subscribing === s.id ? 'Loading…' : 'Subscribe' }}
            </button>
          </div>
        </div>
      </template>

      <!-- My Memberships -->
      <template v-if="view === 'memberships'">
        <div class="empty" v-if="memberships.length === 0">You have no memberships yet.</div>
        <div class="membership-card" v-for="m in memberships" :key="m.id">
          <div>
            <div style="font-weight:600;margin-bottom:.3rem;">{{ subName(m.subscriptionId) }}</div>
            <div style="font-size:.8rem;color:#888">Since {{ fmt(m.startDate || m.createdAt) }}</div>
            <div style="font-size:.8rem;color:#888" v-if="m.nextBillingDate">Next billing: {{ fmt(m.nextBillingDate) }}</div>
          </div>
          <div style="display:flex;align-items:center;gap:.75rem;">
            <span :class="'badge badge-' + m.status.toLowerCase()">{{ m.status }}</span>
            <a v-if="m.status === 'PENDING' && m.checkoutUrl" :href="m.checkoutUrl"
               class="btn btn-primary btn-sm" style="text-decoration:none;">Complete checkout</a>
            <button v-if="m.status === 'ACTIVE'" class="btn-danger-sm" @click="cancel(m)">Cancel</button>
          </div>
        </div>
      </template>

    </template>
  </main>
</div>

<script>
const { createApp, reactive } = Vue;
createApp({
  data() {
    const params = new URLSearchParams(window.location.search);
    return {
      member: JSON.parse(localStorage.getItem('member') || 'null'),
      authMode: 'login',
      authForm: { name: '', email: '' },
      authError: '',
      view: 'browse',
      subscriptions: [],
      memberships: [],
      selected: {},   // { subscriptionId → shopifySellingPlanId }
      subscribing: null,
      checkoutSuccess: params.get('checkout') === 'success',
      checkoutCancelled: params.get('checkout') === 'cancel',
    };
  },
  async mounted() {
    this.subscriptions = await get('/api/subscriptions').catch(() => []);
    if (this.member && this.checkoutSuccess) {
      this.view = 'memberships';
      await this.loadMemberships();
    }
    if (this.checkoutSuccess || this.checkoutCancelled) {
      history.replaceState({}, '', window.location.pathname);
    }
  },
  methods: {
    toggleAuth() { this.authMode = this.authMode === 'register' ? 'login' : 'register'; this.authError = ''; },
    async authSubmit() {
      this.authError = '';
      try {
        const result = this.authMode === 'register'
          ? await post('/api/auth/register', { email: this.authForm.email, name: this.authForm.name })
          : await post('/api/auth/lookup', { email: this.authForm.email });
        this.member = result;
        localStorage.setItem('member', JSON.stringify(result));
      } catch (e) { this.authError = e.message; }
    },
    logout() { this.member = null; localStorage.removeItem('member'); },
    async subscribe(sub) {
      const sellingPlanId = this.selected[sub.id];
      if (!sellingPlanId) return;
      this.subscribing = sub.id;
      try {
        const membership = await post('/api/members/' + this.member.id + '/memberships', {
          subscriptionId: sub.id,
          shopifySellingPlanId: sellingPlanId,
        });
        if (membership.checkoutUrl) window.location.href = membership.checkoutUrl;
        else alert('No checkout URL returned.');
      } catch (e) { alert(e.message); }
      finally { this.subscribing = null; }
    },
    async loadMemberships() {
      this.memberships = await get('/api/members/' + this.member.id + '/memberships').catch(() => []);
    },
    async cancel(m) {
      if (!confirm('Cancel this membership?')) return;
      try {
        await del('/api/members/' + this.member.id + '/memberships/' + m.id);
        await this.loadMemberships();
      } catch (e) { alert(e.message); }
    },
    subName(id) {
      return this.subscriptions.find(s => s.id === id)?.name || id?.slice(-8);
    },
    labelFor(interval, count) {
      const map = { DAY: 'Daily', WEEK: 'Weekly', MONTH: 'Monthly', YEAR: 'Yearly' };
      return count > 1 ? `Every ${count} ${interval.toLowerCase()}s` : (map[interval] || interval);
    },
    fmt(ts) {
      return ts ? new Date(ts).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) : '—';
    },
  },
}).mount('#app');
</script>
</body>
</html>
