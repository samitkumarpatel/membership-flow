<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Membership Admin</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="/js/api.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f6f9; color: #1a1a2e; }
    header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    nav { display: flex; gap: .5rem; margin-left: auto; }
    nav button { background: transparent; border: 1px solid rgba(255,255,255,.4); color: #fff;
      padding: .4rem 1rem; border-radius: 6px; cursor: pointer; font-size: .875rem; }
    nav button.active { background: #fff; color: #1a1a2e; }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: #fff; border-radius: 10px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 1.5rem; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat { background: #fff; border-radius: 10px; padding: 1.25rem; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .stat .num { font-size: 2rem; font-weight: 700; color: #6c63ff; }
    .stat .label { font-size: .8rem; color: #666; margin-top: .25rem; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th, td { padding: .75rem 1rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9ff; font-weight: 600; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: #666; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: .2rem .6rem; border-radius: 20px; font-size: .75rem; font-weight: 600; }
    .badge-active { background: #e6faf0; color: #1d9e6a; }
    .badge-inactive { background: #f0f0f0; color: #888; }
    .badge-pending { background: #fff8e6; color: #c07c00; }
    .badge-cancelled { background: #ffeaea; color: #c0392b; }
    .badge-suspended { background: #fdf0ff; color: #8e44ad; }
    .btn { display: inline-block; padding: .45rem .9rem; border-radius: 6px; font-size: .85rem; cursor: pointer; border: none; font-weight: 500; }
    .btn-primary { background: #6c63ff; color: #fff; }
    .btn-primary:hover { background: #574fd6; }
    .btn-danger { background: #ffeaea; color: #c0392b; }
    .btn-sm { padding: .3rem .7rem; font-size: .8rem; }
    .btn-outline { background: transparent; border: 1px solid #6c63ff; color: #6c63ff; }
    .btn-outline:hover { background: #f0eeff; }
    .row { display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap; margin-bottom: 1rem; }
    .field { display: flex; flex-direction: column; gap: .25rem; }
    .field label { font-size: .8rem; font-weight: 600; color: #555; }
    .field input, .field select, .field textarea { padding: .5rem .75rem; border: 1px solid #ddd; border-radius: 6px; font-size: .9rem; }
    .field input:focus, .field select:focus { outline: none; border-color: #6c63ff; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #fff; border-radius: 12px; padding: 2rem; width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 1.1rem; margin-bottom: 1.25rem; }
    .modal .actions { display: flex; justify-content: flex-end; gap: .5rem; margin-top: 1.25rem; }
    .error { color: #c0392b; font-size: .85rem; margin-top: .5rem; }
    .empty { text-align: center; color: #999; padding: 2rem; font-size: .95rem; }
    select.filter { padding: .4rem .75rem; border: 1px solid #ddd; border-radius: 6px; font-size: .875rem; }
    .plans-inline { display: flex; flex-wrap: wrap; gap: .4rem; }
    .plan-tag { background: #f0eeff; color: #6c63ff; border-radius: 5px; padding: .2rem .55rem; font-size: .78rem; font-weight: 600; }
    .divider { border: none; border-top: 1px solid #eee; margin: 1rem 0; }
    .plan-row { display: flex; gap: .75rem; align-items: center; padding: .5rem; background: #f8f9ff; border-radius: 8px; margin-bottom: .5rem; }
    .plan-row .interval { font-weight: 600; width: 70px; font-size: .85rem; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>Membership Admin</h1>
    <nav>
      <button v-for="t in tabs" :key="t.id" :class="{ active: tab === t.id }" @click="tab = t.id; load()">{{ t.label }}</button>
    </nav>
  </header>
  <main>

    <!-- DASHBOARD -->
    <template v-if="tab === 'dashboard'">
      <div class="stat-grid">
        <div class="stat"><div class="num">{{ stats.active ?? '—' }}</div><div class="label">Active</div></div>
        <div class="stat"><div class="num">{{ stats.pending ?? '—' }}</div><div class="label">Pending</div></div>
        <div class="stat"><div class="num">{{ stats.cancelled ?? '—' }}</div><div class="label">Cancelled</div></div>
        <div class="stat"><div class="num">{{ stats.suspended ?? '—' }}</div><div class="label">Suspended</div></div>
        <div class="stat"><div class="num">{{ stats.total ?? '—' }}</div><div class="label">Total</div></div>
      </div>
    </template>

    <!-- SUBSCRIPTIONS -->
    <template v-if="tab === 'subscriptions'">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:.75rem;">
          <h2 style="font-size:1rem;">Subscriptions</h2>
          <button class="btn btn-primary" @click="openCreate">+ New Subscription</button>
        </div>
        <table>
          <thead><tr><th>Name</th><th>Plans</th><th>Product attached</th><th>Status</th></tr></thead>
          <tbody>
            <tr v-if="subscriptionsError"><td colspan="4" class="empty" style="color:#c0392b">{{ subscriptionsError }}</td></tr>
            <tr v-else-if="subscriptions.length === 0"><td colspan="4" class="empty">No subscriptions yet.</td></tr>
            <tr v-for="s in subscriptions" :key="s.id">
              <td>
                <strong>{{ s.name }}</strong>
                <div style="font-size:.8rem;color:#888">{{ s.description }}</div>
              </td>
              <td>
                <div class="plans-inline">
                  <span class="plan-tag" v-for="p in s.plans" :key="p.shopifySellingPlanId">
                    {{ p.interval }} · {{ p.currency }} {{ p.price }}
                  </span>
                </div>
              </td>
              <td>
                <span v-if="s.shopifyVariantId" style="color:#1d9e6a;font-size:.85rem;">✓ attached</span>
                <span v-else style="color:#aaa;font-size:.85rem;">—</span>
              </td>
              <td><span :class="'badge badge-' + s.status.toLowerCase()">{{ s.status }}</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </template>

    <!-- MEMBERS -->
    <template v-if="tab === 'members'">
      <div class="card">
        <h2 style="font-size:1rem; margin-bottom:.75rem;">Members</h2>
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Registered</th></tr></thead>
          <tbody>
            <tr v-if="members.length === 0"><td colspan="3" class="empty">No members yet.</td></tr>
            <tr v-for="m in members" :key="m.id">
              <td>{{ m.name }}</td>
              <td>{{ m.email }}</td>
              <td><small>{{ fmt(m.createdAt) }}</small></td>
            </tr>
          </tbody>
        </table>
      </div>
    </template>

    <!-- MEMBERSHIPS -->
    <template v-if="tab === 'memberships'">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
          <h2 style="font-size:1rem;">Memberships</h2>
          <select class="filter" v-model="statusFilter" @change="loadMemberships">
            <option value="">All statuses</option>
            <option v-for="s in statuses" :key="s" :value="s">{{ s }}</option>
          </select>
        </div>
        <table>
          <thead><tr><th>ID</th><th>Member</th><th>Subscription</th><th>Status</th><th>Next Billing</th><th></th></tr></thead>
          <tbody>
            <tr v-if="memberships.length === 0"><td colspan="6" class="empty">No memberships.</td></tr>
            <tr v-for="m in memberships" :key="m.id">
              <td><small style="font-family:monospace">{{ m.id.slice(-8) }}</small></td>
              <td><small>{{ m.memberId.slice(-8) }}</small></td>
              <td><small>{{ gidId(m.subscriptionId) }}</small></td>
              <td><span :class="'badge badge-' + m.status.toLowerCase()">{{ m.status }}</span></td>
              <td><small>{{ m.nextBillingDate ? fmt(m.nextBillingDate) : '—' }}</small></td>
              <td>
                <button v-if="m.status !== 'CANCELLED'" class="btn btn-sm btn-danger" @click="adminCancel(m.id)">Cancel</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </template>

  </main>

  <!-- CREATE SUBSCRIPTION MODAL -->
  <div class="modal-backdrop" v-if="showCreate" @click.self="showCreate=false">
    <div class="modal">
      <h2>New Subscription</h2>
      <p style="font-size:.82rem;color:#666;margin-bottom:1rem;">
        Creates a Shopify SellingPlanGroup with the chosen intervals, then creates and attaches a product automatically.
      </p>
      <div class="row">
        <div class="field" style="flex:2">
          <label>Name</label>
          <input v-model="newSub.name" placeholder="e.g. Salon Membership"/>
        </div>
      </div>
      <div class="row">
        <div class="field" style="flex:1">
          <label>Description</label>
          <input v-model="newSub.description" placeholder="Optional"/>
        </div>
      </div>
      <hr class="divider"/>
      <p style="font-size:.82rem;font-weight:600;margin-bottom:.6rem;">Plans (intervals + prices)</p>
      <div class="plan-row" v-for="p in newSub.plans" :key="p.interval">
        <span class="interval">{{ p.interval }}</span>
        <div class="field" style="flex:1">
          <label>Price</label>
          <input type="number" v-model.number="p.price" step="0.01" min="0"/>
        </div>
        <div class="field" style="width:75px">
          <label>Currency</label>
          <input v-model="p.currency" maxlength="3"/>
        </div>
        <div class="field" style="width:60px">
          <label>Every</label>
          <input type="number" v-model.number="p.intervalCount" min="1"/>
        </div>
      </div>
      <div class="error" v-if="modalError">{{ modalError }}</div>
      <div class="actions">
        <button class="btn btn-outline" @click="showCreate=false">Cancel</button>
        <button class="btn btn-primary" :disabled="creating" @click="createSub">
          {{ creating ? 'Creating…' : 'Create in Shopify' }}
        </button>
      </div>
    </div>
  </div>

</div>

<script>
const { createApp } = Vue;
createApp({
  data() {
    return {
      tab: 'dashboard',
      tabs: [
        { id: 'dashboard', label: 'Dashboard' },
        { id: 'subscriptions', label: 'Subscriptions' },
        { id: 'members', label: 'Members' },
        { id: 'memberships', label: 'Memberships' },
      ],
      stats: {},
      subscriptions: [],
      subscriptionsError: '',
      members: [],
      memberships: [],
      statusFilter: '',
      statuses: ['PENDING', 'ACTIVE', 'CANCELLED', 'SUSPENDED'],
      showCreate: false,
      creating: false,
      newSub: { name: '', description: '', plans: [] },
      modalError: '',
    };
  },
  mounted() { this.load(); },
  methods: {
    async load() {
      if (this.tab === 'dashboard') {
        this.stats = await get('/api/admin/dashboard').catch(() => ({}));
      } else if (this.tab === 'subscriptions') {
        this.subscriptionsError = '';
        try {
          this.subscriptions = await get('/api/admin/subscriptions');
        } catch (e) {
          this.subscriptionsError = e.message;
        }
      } else if (this.tab === 'members') {
        this.members = await get('/api/admin/members').catch(() => []);
      } else if (this.tab === 'memberships') {
        await this.loadMemberships();
      }
    },
    async loadMemberships() {
      const q = this.statusFilter ? '?status=' + this.statusFilter : '';
      this.memberships = await get('/api/admin/memberships' + q).catch(() => []);
    },
    openCreate() {
      this.newSub = {
        name: '',
        description: '',
        plans: [
          { interval: 'DAY',   intervalCount: 1, price: 1.99,  currency: 'USD' },
          { interval: 'WEEK',  intervalCount: 1, price: 9.99,  currency: 'USD' },
          { interval: 'MONTH', intervalCount: 1, price: 29.99, currency: 'USD' },
          { interval: 'YEAR',  intervalCount: 1, price: 299.99, currency: 'USD' },
        ],
      };
      this.modalError = '';
      this.showCreate = true;
    },
    async createSub() {
      this.modalError = '';
      this.creating = true;
      try {
        const created = await post('/api/admin/subscriptions', this.newSub);
        this.subscriptions = [created, ...this.subscriptions];
        this.showCreate = false;
      } catch (e) {
        this.modalError = e.message;
      } finally {
        this.creating = false;
      }
    },
    async adminCancel(id) {
      if (!confirm('Cancel this membership?')) return;
      await patch('/api/admin/memberships/' + id + '/cancel').catch(e => alert(e.message));
      await this.loadMemberships();
    },
    gidId(gid) {
      return gid ? gid.split('/').pop() : '—';
    },
    fmt(ts) {
      return ts ? new Date(ts).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) : '—';
    },
  },
}).mount('#app');
</script>
</body>
</html>
